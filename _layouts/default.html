<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>

  <!-- 🍕 Simple Pizza Style -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff5e6;
      color: #333;
      margin: 0;
    }
    header {
      background: #d62828;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 28px;
    }
    main {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    h1, h2, h3 {
      color: #d62828;
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #f77f00;
      color: white;
      margin-top: 40px;
    }

    /* 🍕 ORDER BUTTON STYLE */
    .order-btn {
      display: inline-block;
      background: #d62828;
      color: white;
      padding: 15px 25px;
      margin-top: 20px;
      font-size: 18px;
      text-decoration: none;
      border-radius: 8px;
      transition: 0.3s;
    }

    .order-btn:hover {
      background: #a61e1e;
      transform: scale(1.05);
    }
  </style>

  <!-- Meta Pixel Code -->

  !function(f,b,e,v,n,t,s)

  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];

  <noscript>

  </noscript>
  <!-- End Meta Pixel Code -->

</head>

<body>

<header>
  🍕 Pizza Paradise
</header>

<main>
  {{ content }}
</main>

<footer>
  Made with ❤️ and lots of cheese
</footer>

</body>
</html>
